<!DOCTYPE html>
<html lang="en" dir="ltr" id="root-html" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="icon" href="assets/dog_7104247.png">
    <title>Sign Up | PawsOnWheels</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .theme-transition { transition: all 0.3s ease; }
        @media (min-width: 1024px) { body { overflow: hidden; } }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { screens: { 'xs': '360px' } } }
        }
    </script>
</head>
<body class="theme-transition bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-white font-sans h-full flex flex-col">

    <nav class="w-full flex-none z-50 p-4 md:p-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
             <a href="index.html">
 <div class="flex-shrink-0 flex items-center gap-2">
                    <i data-lucide="dog" class="text-blue-500 w-8 h-8"></i>
                    <span class="text-2xl font-bold tracking-tight">Paws</span>
                </div>
                </a>
            <div class="flex items-center gap-3">
                <button onclick="toggleTheme()" class="p-3 rounded-2xl bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 hover:ring-2 ring-blue-500 transition-all">
                    <i data-lucide="sun" id="sun-icon" class="hidden w-5 h-5 text-yellow-400"></i>
                    <i data-lucide="moon" id="moon-icon" class="w-5 h-5 text-slate-600"></i>
                </button>
                <button onclick="toggleDirection()" class="px-4 py-3 rounded-2xl bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 text-xs font-black ring-blue-500 hover:ring-2 transition-all">
                    <span id="dir-text">LTR</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="flex-1 flex items-center justify-center p-4 md:p-8">
        <div class="w-full max-w-5xl lg:h-[80vh] lg:max-h-[750px] grid grid-cols-1 lg:grid-cols-2 bg-white dark:bg-slate-900 rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100 dark:border-slate-800">
            
            <div class="hidden lg:flex flex-col justify-between p-12 bg-blue-600 text-white relative overflow-hidden">
                <div class="relative z-10">
                    <h2 class="text-4xl font-black leading-tight mb-6">Create Your <span class="text-blue-200">Account</span></h2>
                    <p class="text-blue-100 text-lg">Join the PawsOnWheels family and give your pet the best grooming experience.</p>
                </div>
                
                <div class="relative z-10 bg-white/10 backdrop-blur-md p-6 rounded-3xl border border-white/20">
                    <div class="flex items-center gap-4 mb-4">
                        <div class="w-12 h-12 rounded-full bg-blue-400 flex items-center justify-center"><i data-lucide="shield-check" class="text-white"></i></div>
                        <p class="font-bold">Verified Professionals & Safe Products for your Furry Friends.</p>
                    </div>
                    <span class="text-sm font-medium opacity-70">Trusted by 2,000+ Pet Owners</span>
                </div>

                <div class="absolute -bottom-20 -left-20 w-64 h-64 bg-blue-500 rounded-full blur-3xl opacity-50"></div>
                <div class="absolute -top-20 -right-20 w-64 h-64 bg-blue-700 rounded-full blur-3xl opacity-50"></div>
            </div>

      <div class="p-6 md:p-10 lg:p-8 flex flex-col justify-between h-full overflow-hidden">
    <div class="flex-none mb-3 text-center lg:text-left">
        <h1 class="text-3xl font-black mb-0.5 tracking-tight">Sign Up</h1>
        <p class="text-slate-500 dark:text-slate-400 text-xs font-medium">Create an account to start booking.</p>
    </div>

    <div class="flex-none grid grid-cols-2 gap-3 mb-3">
        <button class="flex items-center justify-center gap-2 p-2.5 rounded-2xl border-2 border-slate-100 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all font-bold text-xs active:scale-95">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-4 h-4" alt="Google"> Google
        </button>
        <button class="flex items-center justify-center gap-2 p-2.5 rounded-2xl border-2 border-slate-100 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all font-bold text-xs active:scale-95">
            <img src="https://www.svgrepo.com/show/475647/facebook-color.svg" class="w-4 h-4" alt="Facebook"> Facebook
        </button>
    </div>

    <div class="flex-none relative mb-3 text-center">
        <hr class="border-slate-100 dark:border-slate-800">
        <span class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 px-4 bg-white dark:bg-slate-900 text-[9px] font-black uppercase text-slate-400">Or use email</span>
    </div>

    <form class="flex-grow flex flex-col justify-center space-y-2 lg:space-y-1.5" onsubmit="event.preventDefault(); alert('Account Created!');">
        <div class="space-y-0.5">
            <label class="text-[9px] font-black uppercase tracking-widest text-slate-400 ml-1">Full Name</label>
            <input type="text" required placeholder="John Doe" 
                class="w-full p-2.5 rounded-xl bg-slate-50 dark:bg-slate-800 border-2 border-transparent focus:border-blue-500 focus:bg-white dark:focus:bg-slate-900 outline-none transition-all font-bold text-sm">
        </div>

        <div class="space-y-0.5">
            <label class="text-[9px] font-black uppercase tracking-widest text-slate-400 ml-1">Email Address</label>
            <input type="email" required placeholder="name@example.com" 
                class="w-full p-2.5 rounded-xl bg-slate-50 dark:bg-slate-800 border-2 border-transparent focus:border-blue-500 focus:bg-white dark:focus:bg-slate-900 outline-none transition-all font-bold text-sm">
        </div>

        <div class="space-y-0.5 relative">
            <label class="text-[9px] font-black uppercase tracking-widest text-slate-400 ml-1">Create Password</label>
            <input type="password" required placeholder="••••••••" 
                class="w-full p-2.5 rounded-xl bg-slate-50 dark:bg-slate-800 border-2 border-transparent focus:border-blue-500 focus:bg-white dark:focus:bg-slate-900 outline-none transition-all font-bold text-sm">
        </div>

        <button class="w-full py-3 bg-blue-600 text-white rounded-xl font-black text-sm shadow-lg shadow-blue-500/30 hover:bg-blue-700 hover:-translate-y-1 transition-all active:scale-95 mt-1">
            Create Account
        </button>
    </form>

    <p class="flex-none mt-4 text-center text-[11px] font-medium text-slate-500 dark:text-slate-400">
        Already have an account? <a href="login.html" class="text-blue-600 font-black hover:underline">Log in</a>
    </p>
</div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            const isDark = html.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcons(isDark);
        }

        function updateThemeIcons(isDark) {
            document.getElementById('sun-icon').classList.toggle('hidden', !isDark);
            document.getElementById('moon-icon').classList.toggle('hidden', isDark);
        }

        function toggleDirection() {
            const html = document.getElementById('root-html');
            const newDir = html.getAttribute('dir') === 'ltr' ? 'rtl' : 'ltr';
            html.setAttribute('dir', newDir);
            document.getElementById('dir-text').innerText = newDir.toUpperCase();
            localStorage.setItem('dir', newDir);
        }

        window.onload = () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                updateThemeIcons(true);
            }
            const savedDir = localStorage.getItem('dir') || 'ltr';
            document.getElementById('root-html').setAttribute('dir', savedDir);
            document.getElementById('dir-text').innerText = savedDir.toUpperCase();
        };
    </script>
</body>
</html>
