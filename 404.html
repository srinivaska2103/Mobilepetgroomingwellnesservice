<!DOCTYPE html>
<html lang="en" dir="ltr" id="root-html" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="icon" href="assets/dog_7104247.png">
    <title>404 - Lost Your Way? | PawsOnWheels</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .theme-transition { transition: all 0.3s ease; }
        /* Smooth floating animation for the dog icon */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .float-animation { animation: float 4s ease-in-out infinite; }
        
        /* Ensure no scroll on desktop views to keep it "fixed-fit" */
        @media (min-width: 1024px) {
            body { overflow: hidden; }
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { screens: { 'xs': '360px' } } }
        }
    </script>
</head>
<body class="theme-transition bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-white font-sans h-full flex flex-col">

    <nav class="flex-none p-4 md:p-6 lg:p-8">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
             <a href="index.html">
 <div class="flex-shrink-0 flex items-center gap-2">
                    <i data-lucide="dog" class="text-blue-500 w-8 h-8"></i>
                    <span class="text-2xl font-bold tracking-tight">Paws</span>
                </div>
                </a>

            <div class="flex items-center gap-3">
                <button onclick="toggleTheme()" class="p-3 md:p-4 rounded-2xl bg-white dark:bg-slate-900 shadow-sm border border-slate-200 dark:border-slate-800 hover:ring-2 ring-blue-500 transition-all active:scale-90" title="Toggle Theme">
                    <i data-lucide="sun" id="sun-icon" class="hidden w-5 h-5 text-yellow-400"></i>
                    <i data-lucide="moon" id="moon-icon" class="w-5 h-5 text-slate-600 dark:text-slate-400"></i>
                </button>
                <button onclick="toggleDirection()" class="px-4 py-3 md:px-5 md:py-4 rounded-2xl bg-white dark:bg-slate-900 shadow-sm border border-slate-200 dark:border-slate-800 text-[10px] md:text-xs font-black ring-blue-500 hover:ring-2 transition-all active:scale-90" title="Toggle Layout Direction">
                    <span id="dir-text">LTR</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="flex-1 flex flex-col items-center justify-center p-6 text-center">
        <div class="max-w-2xl w-full space-y-8 md:space-y-12">
            
            <div class="relative inline-block">
                <div class="absolute inset-0 bg-blue-500 blur-[80px] opacity-20 dark:opacity-10 animate-pulse"></div>
                
                <div class="float-animation relative">
                    <i data-lucide="paw-print" class="w-32 h-32 md:w-48 md:h-48 text-blue-600/20 absolute -top-10 -left-10 -z-10 rotate-12"></i>
                    <i data-lucide="search" class="w-40 h-40 md:w-64 md:h-64 text-blue-600 dark:text-blue-500"></i>
                    <div class="absolute bottom-4 right-4 bg-red-500 text-white font-black px-4 py-2 md:px-6 md:py-3 rounded-2xl text-xl md:text-3xl shadow-2xl border-4 border-white dark:border-slate-950 rotate-12">
                        404
                    </div>
                </div>
            </div>

            <div class="space-y-4 md:space-y-6">
                <h1 class="text-4xl xs:text-5xl md:text-7xl font-black tracking-tighter leading-none">
                    Whoops! <span class="text-blue-600">Lost Your Pack?</span>
                </h1>
                <p class="text-lg md:text-xl text-slate-500 dark:text-slate-400 font-medium max-w-lg mx-auto leading-relaxed">
                    Even the best sniffers get lost sometimes. The page you are looking for has wandered off into the park.
                </p>
            </div>

            <div class="flex flex-col xs:flex-row items-center justify-center gap-4 pt-4">
                <a href="index.html" class="w-full xs:w-auto px-10 py-5 bg-blue-600 text-white rounded-[2rem] font-black text-lg shadow-2xl shadow-blue-500/30 hover:bg-blue-700 hover:-translate-y-1 transition-all active:scale-95 flex items-center justify-center gap-3 group">
                    <i data-lucide="home" class="w-6 h-6 group-hover:scale-110 transition-transform"></i>
                    Back to Safety
                </a>
                <button onclick="history.back()" class="w-full xs:w-auto px-10 py-5 bg-white dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-800 rounded-[2rem] font-black text-lg hover:bg-gray-50 dark:hover:bg-slate-800 transition-all flex items-center justify-center gap-3 active:scale-95">
                    <i data-lucide="arrow-left" class="w-6 h-6"></i>
                    Go Back
                </button>
            </div>
        </div>
    </main>

    <footer class="flex-none p-8 text-center">
        <p class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 dark:text-slate-600">
            Error Code: 404_PAGE_NOT_FOUND // PawsOnWheels v2.0
        </p>
    </footer>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        /**
         * THEME TOGGLE LOGIC
         * Persistent via Local Storage
         */
        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            const isDark = html.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeUI(isDark);
        }

        function updateThemeUI(isDark) {
            const sun = document.getElementById('sun-icon');
            const moon = document.getElementById('moon-icon');
            if (isDark) {
                sun.classList.remove('hidden');
                moon.classList.add('hidden');
            } else {
                sun.classList.add('hidden');
                moon.classList.remove('hidden');
            }
        }

        /**
         * DIRECTION TOGGLE LOGIC (LTR / RTL)
         * Persistent via Local Storage
         */
        function toggleDirection() {
            const html = document.getElementById('root-html');
            const currentDir = html.getAttribute('dir');
            const newDir = currentDir === 'ltr' ? 'rtl' : 'ltr';
            
            html.setAttribute('dir', newDir);
            document.getElementById('dir-text').innerText = newDir.toUpperCase();
            localStorage.setItem('paws-direction', newDir);
        }

        /**
         * INITIALIZE ON LOAD
         */
        window.onload = () => {
            // Load saved theme
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                document.documentElement.classList.add('dark');
                updateThemeUI(true);
            }

            // Load saved direction
            const savedDir = localStorage.getItem('paws-direction') || 'ltr';
            document.getElementById('root-html').setAttribute('dir', savedDir);
            document.getElementById('dir-text').innerText = savedDir.toUpperCase();
        };
    </script>
</body>
</html>
