<!DOCTYPE html>
<html lang="en" dir="ltr" id="root-html" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="icon" href="assets/dog_7104247.png">
    <title>Login | PawsOnWheels</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .theme-transition { transition: all 0.3s ease; }
        /* Prevent scroll only on desktop */
        @media (min-width: 1024px) {
            body { overflow: hidden; }
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { screens: { 'xs': '360px' } } }
        }
    </script>
</head>
<body class="theme-transition bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-white font-sans h-full flex flex-col">

    <nav class="w-full flex-none z-50 p-4 md:p-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
           <a href="index.html">
 <div class="flex-shrink-0 flex items-center gap-2">
                    <i data-lucide="dog" class="text-blue-500 w-8 h-8"></i>
                    <span class="text-2xl font-bold tracking-tight">Paws</span>
                </div>
                </a>

            <div class="flex items-center gap-3">
                <button onclick="toggleTheme()" class="p-3 rounded-2xl bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 hover:ring-2 ring-blue-500 transition-all">
                    <i data-lucide="sun" id="sun-icon" class="hidden w-5 h-5 text-yellow-400"></i>
                    <i data-lucide="moon" id="moon-icon" class="w-5 h-5 text-slate-600"></i>
                </button>
                <button onclick="toggleDirection()" class="px-4 py-3 rounded-2xl bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 text-xs font-black ring-blue-500 hover:ring-2 transition-all">
                    <span id="dir-text">LTR</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="flex-1 flex items-center justify-center p-4 md:p-8">
        <div class="w-full max-w-5xl lg:h-[80vh] lg:max-h-[700px] grid grid-cols-1 lg:grid-cols-2 bg-white dark:bg-slate-900 rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100 dark:border-slate-800">
            
            <div class="hidden lg:flex flex-col justify-between p-12 bg-blue-600 text-white relative overflow-hidden">
                <div class="relative z-10">
                    <h2 class="text-4xl font-black leading-tight mb-6">Welcome Back to the <span class="text-blue-200">Pack!</span></h2>
                    <p class="text-blue-100 text-lg">Manage your pet's appointments and track your groomer in real-time.</p>
                </div>
                
                <div class="relative z-10 bg-white/10 backdrop-blur-md p-6 rounded-3xl border border-white/20">
                    <div class="flex items-center gap-4 mb-4">
                        <div class="w-12 h-12 rounded-full bg-blue-400 flex items-center justify-center"><i data-lucide="star" class="fill-current text-white"></i></div>
                        <p class="font-bold">"Best mobile grooming experience ever. My dog is finally happy!"</p>
                    </div>
                    <span class="text-sm font-medium opacity-70">— Sarah, Goldie's Mom</span>
                </div>

                <div class="absolute -bottom-20 -left-20 w-64 h-64 bg-blue-500 rounded-full blur-3xl opacity-50"></div>
                <div class="absolute -top-20 -right-20 w-64 h-64 bg-blue-700 rounded-full blur-3xl opacity-50"></div>
            </div>

          <div class="p-6 md:p-10 lg:p-12 flex flex-col justify-center h-full overflow-hidden">
    <div class="mb-6 text-center lg:text-left">
        <h1 class="text-3xl font-black mb-1 tracking-tight">Login</h1>
       
    </div>

    <div class="grid grid-cols-2 gap-3 mb-5">
        <button class="flex items-center justify-center gap-2 p-3.5 rounded-2xl border-2 border-slate-100 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all font-bold text-xs active:scale-95">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-4 h-4" alt="Google"> Google
        </button>
        <button class="flex items-center justify-center gap-2 p-3.5 rounded-2xl border-2 border-slate-100 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all font-bold text-xs active:scale-95">
            <img src="https://www.svgrepo.com/show/475647/facebook-color.svg" class="w-4 h-4" alt="Facebook"> Facebook
        </button>
    </div>

    <div class="relative mb-5 text-center">
        <hr class="border-slate-100 dark:border-slate-800">
        <span class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 px-4 bg-white dark:bg-slate-900 text-[10px] font-black uppercase text-slate-400">Or continue with</span>
    </div>

    <form class="space-y-3.5" onsubmit="event.preventDefault(); alert('Login Successful!');">
        <div class="space-y-1">
            <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Email Address</label>
            <input type="email" required placeholder="name@example.com" 
                class="w-full p-3.5 rounded-xl bg-slate-50 dark:bg-slate-800 border-2 border-transparent focus:border-blue-500 focus:bg-white dark:focus:bg-slate-900 outline-none transition-all font-bold text-sm">
        </div>

        <div class="space-y-1">
            <div class="flex justify-between items-center ml-1">
                <label class="text-[10px] font-black uppercase tracking-widest text-slate-400">Password</label>
            
            </div>
            <input type="password" required placeholder="••••••••" 
                 class="w-full p-3.5 rounded-xl bg-slate-50 dark:bg-slate-800 border-2 border-transparent focus:border-blue-500 focus:bg-white dark:focus:bg-slate-900 outline-none transition-all font-bold text-sm">
        </div>
            <a href="#" class="text-[10px] font-black text-blue-600 hover:underline">Forgot Password?</a>

        <button class="w-full py-4 bg-blue-600 text-white rounded-xl font-black text-base shadow-lg shadow-blue-500/30 hover:bg-blue-700 hover:-translate-y-1 transition-all active:scale-95 mt-2">
            Sign In
        </button>
    </form>

    <p class="mt-6 text-center text-xs font-medium text-slate-500 dark:text-slate-400">
        Don't have an account? <a href="regeiester.html" class="text-blue-600 font-black hover:underline">Sign up for free</a>
    </p>
</div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            const isDark = html.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcons(isDark);
        }

        function updateThemeIcons(isDark) {
            document.getElementById('sun-icon').classList.toggle('hidden', !isDark);
            document.getElementById('moon-icon').classList.toggle('hidden', isDark);
        }

        function toggleDirection() {
            const html = document.getElementById('root-html');
            const newDir = html.getAttribute('dir') === 'ltr' ? 'rtl' : 'ltr';
            html.setAttribute('dir', newDir);
            document.getElementById('dir-text').innerText = newDir.toUpperCase();
            localStorage.setItem('dir', newDir);
        }

        window.onload = () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                updateThemeIcons(true);
            }
            const savedDir = localStorage.getItem('dir') || 'ltr';
            document.getElementById('root-html').setAttribute('dir', savedDir);
            document.getElementById('dir-text').innerText = savedDir.toUpperCase();
        };
    </script>
</body>
</html>
