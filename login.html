<!DOCTYPE html>
<html lang="en" dir="ltr" id="root-html" class="min-h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="icon" href="assets/pawprint_4659771.png">
    <title>Login | PAWS Mobile Wellness</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .theme-transition { transition: all 0.3s ease; }
        
        /* Removed the overflow: hidden desktop lock */
        body { 
            overflow-y: auto; 
            overflow-x: hidden;
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#4CAF50',
                        secondary: '#8D6E63',
                        accent: '#FFC107',
                        background: '#F9FAFB',
                    },
                    screens: {
                        'xs': '360px',
                    }
                }
            }
        }
    </script>
</head>
<body class="theme-transition bg-background text-slate-900 dark:bg-slate-950 dark:text-white font-sans min-h-screen flex flex-col">

    <nav class="w-full flex-none z-50 p-4 md:p-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html">
                <div class="flex-shrink-0 flex items-center gap-2">
                    <svg class="w-10 h-10" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 5C13.6569 5 15 3.65685 15 2C15 0.343146 13.6569 0 12 0C10.3431 0 9 0.343146 9 2C9 3.65685 10.3431 5 12 5Z" fill="#4CAF50"/>
                        <path d="M5 8C6.65685 8 8 6.65685 8 5C8 3.34315 6.65685 3 5 3C3.34315 3 2 3.34315 2 5C2 6.65685 3.34315 8 5 8Z" fill="#8D6E63"/>
                        <path d="M19 8C20.6569 8 22 6.65685 22 5C22 3.34315 20.6569 3 19 3C17.3431 3 16 3.34315 16 5C16 6.65685 17.3431 8 19 8Z" fill="#8D6E63"/>
                        <path d="M12 24C16.4183 24 20 20.4183 20 16C20 11.5817 16.4183 10 12 10C7.58172 10 4 11.5817 4 16C4 20.4183 7.58172 24 12 24Z" fill="#4CAF50"/>
                        <path d="M9 16H15M9 18H15M9 20H15" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                    <span class="text-2xl font-black tracking-tighter text-primary dark:text-white uppercase">PAWS</span>
                </div>
            </a>

            <div class="flex items-center gap-3">
                <button onclick="toggleTheme()" class="p-3 rounded-2xl bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 hover:ring-2 ring-primary transition-all">
                    <i data-lucide="sun" id="sun-icon" class="hidden w-5 h-5 text-accent"></i>
                    <i data-lucide="moon" id="moon-icon" class="w-5 h-5 text-slate-600"></i>
                </button>
                <button onclick="toggleDirection()" class="px-4 py-3 rounded-2xl bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 text-xs font-black ring-primary hover:ring-2 transition-all">
                    <span id="dir-text">LTR</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="flex-1 flex items-center justify-center p-4 md:p-8 lg:py-16">
        <div class="w-full max-w-5xl lg:min-h-[600px] grid grid-cols-1 lg:grid-cols-2 bg-white dark:bg-slate-900 rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100 dark:border-slate-800">
            
            <div class="hidden lg:flex flex-col justify-between p-12 bg-primary text-white relative overflow-hidden">
                <div class="relative z-10">
                    <h2 class="text-4xl font-black leading-tight mb-6 uppercase tracking-tighter">Welcome Back to the <span class="text-accent">Pack!</span></h2>
                    <p class="text-green-50 text-lg font-medium">Manage your pet's appointments and track your groomer in real-time.</p>
                </div>
                
                <div class="relative z-10 bg-white/10 backdrop-blur-md p-6 rounded-3xl border border-white/20">
                    <div class="flex items-center gap-4 mb-4">
                        <div class="w-12 h-12 rounded-full bg-accent flex items-center justify-center"><i data-lucide="star" class="fill-current text-gray-900"></i></div>
                        <p class="font-bold">"Best mobile grooming experience ever. My dog is finally happy!"</p>
                    </div>
                    <span class="text-sm font-black uppercase tracking-widest opacity-70">— Sarah, Goldie's Mom</span>
                </div>

                <div class="absolute -bottom-20 -left-20 w-64 h-64 bg-green-400 rounded-full blur-3xl opacity-50"></div>
                <div class="absolute -top-20 -right-20 w-64 h-64 bg-secondary rounded-full blur-3xl opacity-30"></div>
            </div>

            <div class="p-6 md:p-10 lg:p-12 flex flex-col justify-center min-h-[500px]">
                <div class="mb-6 text-center lg:text-left">
                    <h1 class="text-3xl font-black mb-1 tracking-tighter uppercase text-primary">Login</h1>
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Access your pet's profile</p>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-5">
                    <button class="flex items-center justify-center gap-2 p-3.5 rounded-2xl border-2 border-slate-100 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all font-bold text-xs active:scale-95">
                        <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-4 h-4" alt="Google"> Google
                    </button>
                    <button class="flex items-center justify-center gap-2 p-3.5 rounded-2xl border-2 border-slate-100 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all font-bold text-xs active:scale-95">
                        <img src="https://www.svgrepo.com/show/475647/facebook-color.svg" class="w-4 h-4" alt="Facebook"> Facebook
                    </button>
                </div>

                <div class="relative mb-5 text-center">
                    <hr class="border-slate-100 dark:border-slate-800">
                    <span class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 px-4 bg-white dark:bg-slate-900 text-[10px] font-black uppercase text-slate-400">Or continue with</span>
                </div>

                <form class="space-y-3.5" onsubmit="event.preventDefault(); alert('Login Successful! 🐾');">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black uppercase tracking-widest text-primary ml-1">Email Address</label>
                        <input type="email" required placeholder="name@example.com" 
                            class="w-full p-3.5 rounded-xl bg-slate-50 dark:bg-slate-800 border-2 border-transparent focus:border-primary focus:bg-white dark:focus:bg-slate-900 outline-none transition-all font-bold text-sm">
                    </div>

                    <div class="space-y-1">
                        <div class="flex justify-between items-center ml-1">
                            <label class="text-[10px] font-black uppercase tracking-widest text-primary">Password</label>
                        </div>
                        <input type="password" required placeholder="••••••••" 
                             class="w-full p-3.5 rounded-xl bg-slate-50 dark:bg-slate-800 border-2 border-transparent focus:border-primary focus:bg-white dark:focus:bg-slate-900 outline-none transition-all font-bold text-sm">
                    </div>
                    
                    <a href="#" class="text-[10px] font-black text-secondary hover:text-primary transition-colors inline-block uppercase tracking-widest">Forgot Password?</a>

                    <button class="w-full py-4 bg-primary text-white rounded-xl font-black text-base shadow-lg shadow-primary/20 hover:brightness-110 hover:-translate-y-1 transition-all active:scale-95 mt-2 uppercase tracking-widest">
                        Sign In
                    </button>
                </form>

                <p class="mt-6 text-center text-xs font-medium text-slate-500 dark:text-slate-400">
                    Don't have an account? <a href="regeiester.html" class="text-primary font-black hover:underline uppercase tracking-tighter">Sign up for free</a>
                </p>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            const isDark = html.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcons(isDark);
        }

        function updateThemeIcons(isDark) {
            document.getElementById('sun-icon').classList.toggle('hidden', !isDark);
            document.getElementById('moon-icon').classList.toggle('hidden', isDark);
        }

        function toggleDirection() {
            const html = document.getElementById('root-html');
            const newDir = html.getAttribute('dir') === 'ltr' ? 'rtl' : 'ltr';
            html.setAttribute('dir', newDir);
            document.getElementById('dir-text').innerText = newDir.toUpperCase();
            localStorage.setItem('dir', newDir);
        }

        window.onload = () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                updateThemeIcons(true);
            }
            const savedDir = localStorage.getItem('dir') || 'ltr';
            document.getElementById('root-html').setAttribute('dir', savedDir);
            document.getElementById('dir-text').innerText = savedDir.toUpperCase();
        };
    </script>
</body>
</html>
